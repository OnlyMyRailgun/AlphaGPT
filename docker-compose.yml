version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: alphagpt_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: crypto_quant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d crypto_quant"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: alphagpt_app
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASSWORD=password
      - DB_NAME=crypto_quant
    # By default it runs the dashboard.
    # To run other modules, you can use: docker-compose run app python -m data_pipeline.run_pipeline
    command: streamlit run dashboard/app.py --server.port 8501 --server.address 0.0.0.0

volumes:
  postgres_data:
